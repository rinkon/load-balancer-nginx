version: "3.9"

services:
  app1:
    build: .
    container_name: app1
    environment:
      - PORT=8000
      - INSTANCE_NAME=app1
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  app2:
    build: .
    container_name: app2
    environment:
      - PORT=8001
      - INSTANCE_NAME=app2
    ports:
      - "8001:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  app3:
    build: .
    container_name: app3
    environment:
      - PORT=8002
      - INSTANCE_NAME=app3
    ports:
      - "8002:8002"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002
  
  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    depends_on:
      - app1
      - app2
      - app3
    volumes:
    - ./app/nginx/nginx.conf:/etc/nginx/nginx.conf
